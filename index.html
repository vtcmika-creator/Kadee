                            <button onClick={() => setQuickAddQuantities(prev => ({ ...prev, [template.id]: String((parseInt(prev[template.id]) || 1) + 1) }))} style={{ padding: '0.4rem 0.5rem', background: inputBg, border: 'none', borderLeft: `1px solid ${cardBorder}`, cursor: 'pointer', fontSize: '0.9rem', fontWeight: 700, color: textColor }}>+</button>
                          </div>
                            <button onClick={() => quickAddFromTemplate(template)} style={{ padding: '0.5rem 0.8rem', background: justAdded === template.id ? '#b8d4bc' : (isTemplateInInventory(template.name) ? '#d9ced7' : '#7db89a'), color: 'white', border: 'none', borderRadius: '6px', cursor: isTemplateInInventory(template.name) && justAdded !== template.id ? 'not-allowed' : 'pointer', fontSize: '0.8rem', fontWeight: 600, opacity: isTemplateInInventory(template.name) && justAdded !== template.id ? 0.6 : 1, transition: 'all 0.3s ease', transform: justAdded === template.id ? 'scale(1.15)' : 'scale(1)' }}>
                              {justAdded === template.id ? '✓' : '+'}
                            </button>
                            <button onClick={() => { setShowProductStats(true); setSelectedProductStats(template.name); }} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '1rem', color: '#85b8d0', transition: 'all 0.3s', padding: '0.5rem', minWidth: 'auto' }}>📊</button>
                            <button onClick={() => setChangeCatFor(changeCatFor === template.id ? null : template.id)} title="Changer de catégorie" style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '1rem', color: '#f0c87a', transition: 'all 0.3s', padding: '0.5rem', minWidth: 'auto' }}>🏷️</button>
                            <button onClick={() => deleteTemplate(template.id)} style={{ background: '#f5f0e8', border: `1px solid ${cardBorder}`, padding: '0.5rem', borderRadius: '6px', cursor: 'pointer', fontSize: '1rem', color: '#e8a090', transition: 'all 0.3s', marginLeft: 'auto' }}>×</button>
                          </div>
                          {changeCatFor === template.id && (
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.4rem', paddingTop: '0.5rem', borderTop: `1px solid ${cardBorder}` }}>
                              {categories.map(cat => (
                                <button key={cat} onClick={() => changeTemplateCategory(template.id, cat)} style={{ padding: '0.3rem 0.8rem', border: template.category === cat ? 'none' : `1px solid ${cardBorder}`, borderRadius: '20px', fontSize: '0.75rem', cursor: 'pointer', background: template.category === cat ? '#6a9a7e' : inputBg, color: template.category === cat ? 'white' : textColor, fontWeight: template.category === cat ? 600 : 400 }}>{cat}</button>
                              ))}
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ))
            )}

            {favoriteTemplates.length === 0 && Object.entries(groupedTemplates).length === 0 && (
              <div style={{ textAlign: 'center', padding: '3rem 1rem', color: '#999', animation: 'fadeIn 0.3s' }}>
                <p style={{ fontSize: '1rem', margin: 0 }}>Ajoute tes produits habituels</p>
              </div>
            )}
          </>
        )}

        {view === 'recipes' && (
          <>
            {!selectedRecipe ? (
              <>
                {/* LISTE DES RECETTES */}
                <div style={{ marginBottom: '1rem' }}>
                  <input type="search" placeholder="Rechercher une recette..." value={recipeSearch} onChange={e => setRecipeSearch(e.target.value)} style={{ width: '100%', padding: '0.85rem', border: `1px solid ${cardBorder}`, borderRadius: '10px', fontSize: '0.95rem', background: inputBg, color: textColor, boxSizing: 'border-box' }} />
                </div>
                <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap', marginBottom: '1.5rem' }}>
                  {['Toutes', ...new Set(RECIPES.map(r => r.category))].map(cat => (
                    <button key={cat} onClick={() => setActiveRecipeCategory(cat)} style={{ padding: '0.4rem 0.9rem', borderRadius: '20px', border: activeRecipeCategory === cat ? 'none' : `1px solid ${cardBorder}`, background: activeRecipeCategory === cat ? '#e8a090' : inputBg, color: activeRecipeCategory === cat ? 'white' : textColor, cursor: 'pointer', fontSize: '0.82rem', fontWeight: activeRecipeCategory === cat ? 600 : 400 }}>{cat}</button>
                  ))}
                </div>
                {recipeFavorites.length > 0 && activeRecipeCategory === 'Toutes' && recipeSearch.length < 2 && (
                  <div style={{ marginBottom: '2rem' }}>
                    <h2 style={{ fontSize: '1rem', fontWeight: 600, color: '#f0c87a', marginBottom: '0.75rem' }}>Mes favoris</h2>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(150px, 1fr))', gap: '0.75rem' }}>
                      {RECIPES.filter(r => recipeFavorites.includes(r.id)).map(recipe => (
                        <div key={recipe.id} onClick={() => { setSelectedRecipe(recipe); setRecipePortions(2); setRecipeSelectedIngredients(Object.fromEntries(recipe.ingredients.map((ing, i) => [i, true]))); }} style={{ background: cardBg, borderRadius: '12px', padding: '1rem', border: `2px solid #f0c87a`, cursor: 'pointer', position: 'relative' }}>
                          <button onClick={e => { e.stopPropagation(); setRecipeFavorites(prev => prev.filter(id => id !== recipe.id)); }} style={{ position: 'absolute', top: '0.5rem', right: '0.5rem', background: 'none', border: 'none', cursor: 'pointer', fontSize: '1rem', color: '#f0c87a' }}>★</button>
                          <div style={{ fontSize: '0.9rem', fontWeight: 600, color: textColor, marginBottom: '0.3rem', paddingRight: '1.5rem' }}>{recipe.name}</div>
                          <div style={{ fontSize: '0.72rem', color: '#e8a090', fontWeight: 500, marginBottom: '0.2rem' }}>{recipe.category}</div>
                          <div style={{ fontSize: '0.75rem', color: '#999' }}>⏱ {recipe.time} min · {recipe.difficulty}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(150px, 1fr))', gap: '0.75rem' }}>
                  {RECIPES.filter(r => {
                    const matchSearch = recipeSearch.length < 2 || r.name.toLowerCase().includes(recipeSearch.toLowerCase());
                    const matchCat = activeRecipeCategory === 'Toutes' || r.category === activeRecipeCategory;
                    return matchSearch && matchCat;
                  }).map(recipe => {
                    const isFav = recipeFavorites.includes(recipe.id);
                    return (
                      <div key={recipe.id} onClick={() => { setSelectedRecipe(recipe); setRecipePortions(2); setRecipeSelectedIngredients(Object.fromEntries(recipe.ingredients.map((ing, i) => [i, true]))); }} style={{ background: cardBg, borderRadius: '12px', padding: '1rem', border: `1px solid ${cardBorder}`, cursor: 'pointer', position: 'relative' }}>
                        <button onClick={e => { e.stopPropagation(); setRecipeFavorites(prev => isFav ? prev.filter(id => id !== recipe.id) : [...prev, recipe.id]); }} style={{ position: 'absolute', top: '0.5rem', right: '0.5rem', background: 'none', border: 'none', cursor: 'pointer', fontSize: '1rem', color: isFav ? '#f0c87a' : '#ccc' }}>★</button>
                        <div style={{ fontSize: '0.9rem', fontWeight: 600, color: textColor, marginBottom: '0.3rem', paddingRight: '1.5rem' }}>{recipe.name}</div>
                        <div style={{ fontSize: '0.72rem', color: '#e8a090', fontWeight: 500, marginBottom: '0.2rem' }}>{recipe.category}</div>
                        <div style={{ fontSize: '0.75rem', color: '#999' }}>⏱ {recipe.time} min · {recipe.difficulty}</div>
                      </div>
                    );
                  })}
                </div>
              </>
            ) : (
              <>
                {/* DÉTAIL D'UNE RECETTE */}
                <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1.5rem' }}>
                  <button onClick={() => { setSelectedRecipe(null); setRecipeSelectedIngredients({}); }} style={{ background: inputBg, border: `1px solid ${cardBorder}`, padding: '0.6rem 0.9rem', borderRadius: '10px', cursor: 'pointer', fontSize: '0.9rem', color: textColor, fontWeight: 600 }}>← Retour</button>
                  <h2 style={{ fontSize: '1.2rem', margin: 0, color: textColor, fontWeight: 700, flex: 1 }}>{selectedRecipe.name}</h2>
                  <button onClick={() => setRecipeFavorites(prev => recipeFavorites.includes(selectedRecipe.id) ? prev.filter(id => id !== selectedRecipe.id) : [...prev, selectedRecipe.id])} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '1.4rem', color: recipeFavorites.includes(selectedRecipe.id) ? '#f0c87a' : '#ccc' }}>★</button>
                </div>
                <div style={{ display: 'flex', gap: '0.75rem', marginBottom: '1.5rem', flexWrap: 'wrap' }}>
                  <div style={{ background: inputBg, borderRadius: '8px', padding: '0.5rem 1rem', border: `1px solid ${cardBorder}`, fontSize: '0.85rem', color: '#999' }}>⏱ {selectedRecipe.time} min</div>
                  <div style={{ background: inputBg, borderRadius: '8px', padding: '0.5rem 1rem', border: `1px solid ${cardBorder}`, fontSize: '0.85rem', color: '#999' }}>{selectedRecipe.difficulty}</div>
                  <div style={{ background: inputBg, borderRadius: '8px', padding: '0.4rem 0.75rem', border: `1px solid ${cardBorder}`, display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                    <span style={{ fontSize: '0.85rem', color: '#999' }}>Portions :</span>
                    <button onClick={() => { const p = Math.max(1, recipePortions - 1); setRecipePortions(p); }} style={{ background: cardBg, border: `1px solid ${cardBorder}`, borderRadius: '6px', padding: '0.15rem 0.5rem', cursor: 'pointer', fontWeight: 700, color: textColor }}>−</button>
                    <span style={{ fontWeight: 700, minWidth: '20px', textAlign: 'center', color: textColor }}>{recipePortions}</span>
                    <button onClick={() => setRecipePortions(p => p + 1)} style={{ background: cardBg, border: `1px solid ${cardBorder}`, borderRadius: '6px', padding: '0.15rem 0.5rem', cursor: 'pointer', fontWeight: 700, color: textColor }}>+</button>
                  </div>
                </div>

                {/* INGRÉDIENTS AVEC SÉLECTION */}
                <div style={{ background: cardBg, borderRadius: '12px', padding: '1.5rem', border: `1px solid ${cardBorder}`, marginBottom: '1.5rem' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                    <h3 style={{ margin: 0, fontSize: '1rem', fontWeight: 700, color: textColor }}>Ingrédients</h3>
                    <div style={{ display: 'flex', gap: '0.5rem' }}>
                      <button onClick={() => setRecipeSelectedIngredients(Object.fromEntries(selectedRecipe.ingredients.map((ing, i) => [i, true])))} style={{ fontSize: '0.78rem', padding: '0.3rem 0.6rem', background: inputBg, border: `1px solid ${cardBorder}`, borderRadius: '6px', cursor: 'pointer', color: textColor }}>Tout sélectionner</button>
                      <button onClick={() => setRecipeSelectedIngredients({})} style={{ fontSize: '0.78rem', padding: '0.3rem 0.6rem', background: inputBg, border: `1px solid ${cardBorder}`, borderRadius: '6px', cursor: 'pointer', color: textColor }}>Tout désélectionner</button>
                    </div>
                  </div>
                  <div style={{ fontSize: '0.8rem', color: '#999', marginBottom: '0.75rem' }}>
                    Coche les ingrédients à acheter. Les produits en vert sont déjà dans ton inventaire.
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '0' }}>
                    {selectedRecipe.ingredients.map((ing, idx) => {
                      const ratio = recipePortions / 2;
                      const qty = Math.round(ing.quantity * ratio * 10) / 10;
                      const inInv = templates.some(t => t.name.toLowerCase() === ing.name.toLowerCase());
                      const isSelected = recipeSelectedIngredients[idx] !== false;
                      return (
                        <div key={idx} onClick={() => setRecipeSelectedIngredients(prev => ({ ...prev, [idx]: !isSelected }))} style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', padding: '0.6rem 0.5rem', borderBottom: idx < selectedRecipe.ingredients.length - 1 ? `1px solid ${cardBorder}` : 'none', cursor: 'pointer', background: isSelected ? 'transparent' : '#f9f9f9', borderRadius: idx === 0 ? '4px 4px 0 0' : idx === selectedRecipe.ingredients.length - 1 ? '0 0 4px 4px' : '0' }}>
                          <div style={{ width: '20px', height: '20px', borderRadius: '4px', border: `2px solid ${isSelected ? '#6a9a7e' : '#ccc'}`, background: isSelected ? '#6a9a7e' : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                            {isSelected && <span style={{ color: 'white', fontSize: '0.7rem', fontWeight: 700 }}>✓</span>}
                          </div>
                          <span style={{ flex: 1, fontSize: '0.9rem', color: inInv ? '#6a9a7e' : textColor, fontWeight: inInv ? 600 : 400, textDecoration: !isSelected ? 'line-through' : 'none' }}>{ing.name}{inInv ? ' ✓' : ''}</span>
                          <span style={{ fontSize: '0.85rem', color: '#999', whiteSpace: 'nowrap' }}>{qty} {ing.unit}</span>
                        </div>
                      );
                    })}
                  </div>
                  <button onClick={() => {
                    const toAdd = selectedRecipe.ingredients.filter((ing, idx) => recipeSelectedIngredients[idx] !== false);
                    if (toAdd.length === 0) return;
                    const ratio = recipePortions / 2;
                    const recipeCat = '🍽️ ' + selectedRecipe.name;
                    const newIngredients = toAdd.map((ing, idx) => ({ id: Date.now() + idx, name: ing.name, category: recipeCat, quantity: Math.round(ing.quantity * ratio * 10) / 10, unit: ing.unit, note: '', favorite: false, fromRecipe: true }));
                    const newItems2 = [...items, ...newIngredients];
                    setItems(newItems2);
                    addAction({ items: newItems2 });
                    setView('inventory');
                    setSelectedRecipe(null);
                    setRecipeSelectedIngredients({});
                  }} style={{ width: '100%', marginTop: '1rem', padding: '0.9rem', background: 'linear-gradient(135deg, #7db89a 0%, #6aab8a 100%)', color: 'white', border: 'none', borderRadius: '10px', cursor: 'pointer', fontSize: '0.95rem', fontWeight: 600 }}>
                    Ajouter les ingrédients sélectionnés à mes courses
                  </button>
                </div>

                {/* ÉTAPES DE PRÉPARATION */}
                <div style={{ background: cardBg, borderRadius: '12px', padding: '1.5rem', border: `1px solid ${cardBorder}` }}>
                  <h3 style={{ margin: '0 0 1rem 0', fontSize: '1rem', fontWeight: 700, color: textColor }}>Préparation</h3>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                    {selectedRecipe.steps.map((step, idx) => (
                      <div key={idx} style={{ display: 'flex', gap: '0.75rem', alignItems: 'flex-start' }}>
                        <div style={{ width: '26px', height: '26px', borderRadius: '50%', background: '#e8a090', color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.78rem', fontWeight: 700, flexShrink: 0 }}>{idx + 1}</div>
                        <p style={{ margin: 0, fontSize: '0.9rem', lineHeight: 1.6, color: textColor }}>{step}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </>
            )}
          </>
        )}
      </div>
    </div>

    {/* ===== BOUTON FLOTTANT KADEE IA ===== */}
    {!showKadeeIA && (
      <button onClick={() => setShowKadeeIA(true)} style={{ position: 'fixed', bottom: '1.5rem', right: '1.5rem', width: '56px', height: '56px', borderRadius: '50%', background: 'linear-gradient(135deg, #e8a090 0%, #c47a6a 100%)', color: 'white', border: 'none', cursor: 'pointer', fontSize: '1.4rem', boxShadow: '0 4px 16px rgba(232,160,144,0.5)', zIndex: 8000, display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.3s' }} title="Kadee IA">✨</button>
    )}

    {/* ===== MODAL KADEE IA ===== */}
    {showKadeeIA && (
      <div style={{ position: 'fixed', inset: 0, zIndex: 9000, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}>
        <div onClick={() => setShowKadeeIA(false)} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.4)' }} />
        <div style={{ position: 'relative', background: cardBg, borderRadius: '20px 20px 0 0', padding: '1.25rem', maxHeight: '85vh', display: 'flex', flexDirection: 'column', boxShadow: '0 -4px 24px rgba(0,0,0,0.15)' }}>

          {/* Header */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem', flexShrink: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
              <span style={{ fontSize: '1.3rem' }}>✨</span>
              <span style={{ fontWeight: 700, fontSize: '1.1rem', color: '#e8a090' }}>Kadee IA</span>
            </div>
            <button onClick={() => { setShowKadeeIA(false); setKadeeIAMessages([]); setKadeeIAInput(''); }} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '1.3rem', color: '#999' }}>×</button>
          </div>

          {/* Suggestions rapides (si pas encore de messages) */}
          {kadeeIAMessages.length === 0 && (
            <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap', marginBottom: '1rem', flexShrink: 0 }}>
              {['Suggère-moi une recette rapide', 'Menu pour la semaine', 'Recette végétarienne facile', 'Dessert simple'].map(s => (
                <button key={s} onClick={() => sendKadeeIA(s)} style={{ padding: '0.45rem 0.85rem', background: inputBg, border: `1px solid ${cardBorder}`, borderRadius: '20px', cursor: 'pointer', fontSize: '0.82rem', color: textColor, fontWeight: 500 }}>{s}</button>
              ))}
            </div>
          )}

          {/* Messages */}
          <div style={{ flex: 1, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: '0.75rem', marginBottom: '1rem', minHeight: kadeeIAMessages.length > 0 ? '200px' : '0' }}>
            {kadeeIAMessages.map((msg, idx) => (
              <div key={idx} style={{ display: 'flex', justifyContent: msg.role === 'user' ? 'flex-end' : 'flex-start' }}>
                {msg.content === 'ERREUR_API' ? (
                  <div style={{ background: '#fff0f0', border: '1px solid #f0c4c4', borderRadius: '12px', padding: '0.75rem 1rem', maxWidth: '85%', fontSize: '0.875rem', color: '#c04040' }}>
                    Clé API manquante. Va dans <strong>Paramètres</strong> pour l'ajouter.
                  </div>
                ) : (
                  <div style={{ background: msg.role === 'user' ? '#e8a090' : inputBg, color: msg.role === 'user' ? 'white' : textColor, borderRadius: msg.role === 'user' ? '16px 16px 4px 16px' : '16px 16px 16px 4px', padding: '0.75rem 1rem', maxWidth: '85%', fontSize: '0.875rem', lineHeight: 1.6, border: msg.role === 'assistant' ? `1px solid ${cardBorder}` : 'none', whiteSpace: 'pre-wrap' }}>
                    {msg.content}
                  </div>
                )}
              </div>
            ))}
            {kadeeIALoading && (
              <div style={{ display: 'flex', justifyContent: 'flex-start' }}>
                <div style={{ background: inputBg, border: `1px solid ${cardBorder}`, borderRadius: '16px 16px 16px 4px', padding: '0.75rem 1rem', fontSize: '0.875rem', color: '#999' }}>
                  ✨ Kadee IA réfléchit...
                </div>
              </div>
            )}
          </div>

          {/* Saisie */}
          <div style={{ display: 'flex', gap: '0.5rem', flexShrink: 0 }}>
            <input
              type="text"
              placeholder="Pose ta question à Kadee IA..."
              value={kadeeIAInput}
              onChange={e => setKadeeIAInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && !kadeeIALoading) sendKadeeIA(); }}
              style={{ flex: 1, padding: '0.85rem', border: `1px solid ${cardBorder}`, borderRadius: '10px', fontSize: '0.9rem', background: inputBg, color: textColor, outline: 'none' }}
            />
            <button
              onClick={() => { if (!kadeeIALoading) sendKadeeIA(); }}
              disabled={kadeeIALoading || !kadeeIAInput.trim()}
              style={{ padding: '0.85rem 1.1rem', background: kadeeIALoading || !kadeeIAInput.trim() ? '#ccc' : 'linear-gradient(135deg, #e8a090 0%, #c47a6a 100%)', color: 'white', border: 'none', borderRadius: '10px', cursor: kadeeIALoading || !kadeeIAInput.trim() ? 'not-allowed' : 'pointer', fontSize: '1.1rem', fontWeight: 700 }}>→</button>
          </div>

        </div>
      </div>
    )}
    </>
  );
}

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Kadee />);

    </script>
</body>
</html>
