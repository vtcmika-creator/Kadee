                    <div style={{ fontWeight: 500, fontSize: '0.95rem', display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                      <span style={{ width: '10px', height: '10px', borderRadius: '3px', background: getCategoryColor(cat) }}></span>
                      {cat}
                    </div>
                    <button onClick={() => deleteCategory(cat)} style={{ background: '#f5f0e8', border: `1px solid ${cardBorder}`, padding: '0.6rem', borderRadius: '8px', cursor: 'pointer', fontSize: '1.1rem', color: '#e8a090', transition: 'all 0.3s' }}>×</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div style={{ background: cardBg, borderRadius: '12px', padding: '1.5rem', marginTop: '2rem', border: `1px solid ${cardBorder}` }}>
            <h3 style={{ margin: '0 0 1rem 0', fontSize: '1rem', fontWeight: 600, color: textColor }}>Affichage & Données</h3>
            <div style={{ display: 'grid', gap: '0.75rem' }}>
              <button onClick={() => setDarkMode(!darkMode)} style={{ width: '100%', padding: '1rem', background: inputBg, border: `1px solid ${cardBorder}`, borderRadius: '10px', cursor: 'pointer', fontSize: '0.95rem', fontWeight: 600, color: textColor, textAlign: 'left', transition: 'all 0.3s' }}>{darkMode ? '☀️ Passer en mode jour' : '🌙 Passer en mode nuit'}</button>
              <button onClick={exportData} style={{ width: '100%', padding: '1rem', background: inputBg, border: `1px solid #6a9a7e`, borderRadius: '10px', cursor: 'pointer', fontSize: '0.95rem', fontWeight: 600, color: '#6a9a7e', textAlign: 'left', transition: 'all 0.3s' }}>💾 Sauvegarder mes données</button>
              <label style={{ width: '100%', display: 'block', padding: '1rem', background: inputBg, border: `1px solid #85b8d0`, borderRadius: '10px', cursor: 'pointer', fontSize: '0.95rem', fontWeight: 600, color: '#85b8d0', textAlign: 'left', transition: 'all 0.3s', boxSizing: 'border-box' }}>
                📂 Restaurer mes données
                <input type="file" accept=".json" style={{ display: 'none' }} onChange={e => { importData(e.target.files[0]); e.target.value=''; }} />
              </label>
            </div>
          </div>

          <div style={{ background: cardBg, borderRadius: '12px', padding: '2rem', marginTop: '2rem', border: `2px solid #e8a090` }}>
            <h3 style={{ margin: '0 0 1rem 0', fontSize: '1rem', fontWeight: 600, color: '#e8a090' }}>⚠️ Zone de danger</h3>
            <p style={{ margin: '0 0 1.5rem 0', fontSize: '0.9rem', color: '#999', lineHeight: 1.5 }}>Réinitialise complètement l'historique des achats. Cette action ne peut pas être annulée.</p>
            
            {!confirmResetHistory ? (
              <button onClick={() => setConfirmResetHistory(true)} style={{ width: '100%', padding: '0.85rem', background: '#e8a090', color: 'white', border: 'none', borderRadius: '8px', cursor: 'pointer', fontSize: '0.95rem', fontWeight: 600, transition: 'all 0.3s' }}>🗑️ Réinitialiser l'historique</button>
            ) : (
              <div style={{ background: inputBg, padding: '1rem', borderRadius: '8px', border: `2px solid #e8a090` }}>
                <p style={{ margin: '0 0 1rem 0', fontSize: '0.9rem', fontWeight: 600, color: '#e8a090' }}>Êtes-vous vraiment sûr ?</p>
                <div style={{ display: 'flex', gap: '1rem' }}>
                  <button onClick={() => { setHistory([]); setConfirmResetHistory(false); }} style={{ flex: 1, padding: '0.75rem', background: '#e8a090', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer', fontSize: '0.9rem', fontWeight: 600, transition: 'all 0.3s' }}>Oui, supprimer</button>
                  <button onClick={() => setConfirmResetHistory(false)} style={{ flex: 1, padding: '0.75rem', background: inputBg, color: textColor, border: `1px solid ${cardBorder}`, borderRadius: '6px', cursor: 'pointer', fontSize: '0.9rem', fontWeight: 600, transition: 'all 0.3s' }}>Annuler</button>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // FONCTIONS SCANNER TICKET
  const analyzeTicket = async () => {
    if (!ticketPhotos.length || !apiKey) return;
    setIsAnalyzing(true);
    try {
      const imageBlocks = ticketPhotos.map(p => ({
        type: 'image',
        source: { type: 'base64', media_type: 'image/jpeg', data: p.base64 }
      }));
      const response = await fetch('https://kadee-proxy.vtc-mika.workers.dev', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 2000,
          messages: [{
            role: 'user',
            content: [
              ...imageBlocks,
              { type: 'text', text: `Voici ${ticketPhotos.length} photo(s) d'un même ticket de caisse.

Mes produits existants dans l'application: ${[...new Set([...items.map(i => i.name), ...templates.map(t => t.name)])].join(', ') || 'aucun pour l\'instant'}.

Analyse l'ensemble et extrait TOUS les articles achetés sans doublon. Pour chaque article:
1. Essaie de faire correspondre l'intitulé du ticket avec un de mes produits existants. Si la correspondance est évidente (ex: "TOM CERISES 250G" → "tomates"), utilise ce nom et mets confidence: "high".
2. Si aucun produit existant ne correspond, clarifie le nom en français et mets confidence: "high" si c'est clair, "low" si c'est ambigu.
3. Pour les confidence "low", propose 2-3 suggestions dont en priorité les produits existants qui pourraient correspondre.
4. Ignore totaux, TVA, réductions globales, lignes sans prix produit.

Réponds UNIQUEMENT en JSON valide: {"products": [{"raw_name": "...", "clean_name": "...", "price": 0.00, "confidence": "high", "suggestions": []}]}` }
            ]
          }]
        })
      });
      const data = await response.json();
      const text = data.content[0].text;
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (jsonMatch) {
        const parsed = JSON.parse(jsonMatch[0]);
        const products = (parsed.products || []).map((p, i) => ({
          ...p,
          id: i,
          editedName: p.clean_name,
          include: true
        }));
        setExtractedProducts(products);
        setScanStep('review');
      }
    } catch(e) {
      alert('Erreur analyse: ' + e.message);
    }
    setIsAnalyzing(false);
  };

  const savePrices = () => {
    const today = new Date().toLocaleDateString('fr-FR');
    const timestamp = Date.now();
    const newPriceHistory = { ...priceHistory };
    extractedProducts.filter(p => p.include).forEach(p => {
      const name = p.editedName.trim();
      if (!name || !p.price) return;
      if (!newPriceHistory[name]) newPriceHistory[name] = [];
      newPriceHistory[name] = [...newPriceHistory[name], { price: p.price, date: today, timestamp }];
      if (newPriceHistory[name].length > 20) newPriceHistory[name] = newPriceHistory[name].slice(-20);
    });
    setPriceHistory(newPriceHistory);
    setScanStep('done');
  };

  const exportData = () => {
    const data = localStorage.getItem('kadee_data');
    if (!data) return;
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'kadee-sauvegarde-' + new Date().toLocaleDateString('fr-FR').replace(/\//g, '-') + '.json';
    a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        localStorage.setItem('kadee_data', JSON.stringify(data));
        setItems(data.items || []);
        setTemplates(data.templates || []);
        setHistory(data.history || []);
        setCategories(data.categories || DEFAULT_CATEGORIES);
        setLoyaltyCards(data.loyaltyCards || []);
        setExpenses(data.expenses || []);
        setPriceHistory(data.priceHistory || {});
        if (data.apiKey) setApiKey(data.apiKey);
        alert('✅ Données restaurées avec succès !');
      } catch(e) {
        alert('❌ Fichier invalide');
      }
    };
    reader.readAsText(file);
  };

  const getPriceEvolution = () => {
    return Object.entries(priceHistory)
      .map(([name, entries]) => {
        if (entries.length < 2) return null;
        const sorted = [...entries].sort((a, b) => a.timestamp - b.timestamp);
        const last = sorted[sorted.length - 1];
        const prev = sorted[sorted.length - 2];
        const diff = last.price - prev.price;
        const pct = ((diff / prev.price) * 100).toFixed(1);
        return { name, lastPrice: last.price, prevPrice: prev.price, diff, pct, lastDate: last.date, prevDate: prev.date };
      })
      .filter(Boolean)
      .sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff));
  };

  // PAGE SCANNER TICKET
  if (showTicketScanner) {
    return (
      <div style={{ minHeight: '100vh', background: bgGradient, fontFamily: '"Outfit", sans-serif', padding: '1.5rem', color: textColor }}>
        <style>{styles}</style>
        <div style={{ maxWidth: '600px', margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
            <h1 style={{ fontSize: '1.5rem', margin: 0, color: '#6a9a7e', fontWeight: 600 }}>📸 Scanner un ticket</h1>
            <button onClick={() => setShowTicketScanner(false)} style={{ background: cardBg, border: `1px solid ${cardBorder}`, padding: '0.75rem', borderRadius: '10px', cursor: 'pointer', fontSize: '1.2rem', color: textColor }}>×</button>
          </div>

          {/* Clé API */}
          <div style={{ background: cardBg, borderRadius: '12px', padding: '1.25rem', border: `1px solid ${cardBorder}`, marginBottom: '1.5rem' }}>
            <div style={{ fontSize: '0.85rem', fontWeight: 600, color: '#6a9a7e', marginBottom: '0.5rem' }}>Clé API Anthropic</div>
            <input
              type="password"
              placeholder="sk-ant-api03-..."
              value={apiKey}
              onChange={e => setApiKey(e.target.value)}
              style={{ width: '100%', padding: '0.75rem', border: `1px solid ${cardBorder}`, borderRadius: '8px', fontSize: '0.9rem', background: inputBg, color: textColor, boxSizing: 'border-box' }}
            />
            {!apiKey && <div style={{ fontSize: '0.75rem', color: '#e8a090', marginTop: '0.4rem' }}>Requis pour analyser les tickets (console.anthropic.com)</div>}
            {apiKey && <div style={{ fontSize: '0.75rem', color: '#7db89a', marginTop: '0.4rem' }}>✓ Clé sauvegardée automatiquement</div>}
          </div>

          {scanStep === 'photo' && (
            <div style={{ background: cardBg, borderRadius: '12px', padding: '1.5rem', border: `1px solid ${cardBorder}` }}>
              {/* Aperçus des photos ajoutées */}
              {ticketPhotos.length > 0 && (
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(100px, 1fr))', gap: '0.5rem', marginBottom: '1rem' }}>
                  {ticketPhotos.map((p, i) => (
                    <div key={i} style={{ position: 'relative' }}>
                      <img src={p.preview} alt={`ticket ${i+1}`} style={{ width: '100%', height: '100px', objectFit: 'cover', borderRadius: '8px', border: `1px solid ${cardBorder}` }} />
                      <button onClick={() => setTicketPhotos(prev => prev.filter((_, idx) => idx !== i))} style={{ position: 'absolute', top: '4px', right: '4px', background: 'rgba(0,0,0,0.6)', color: 'white', border: 'none', borderRadius: '50%', width: '22px', height: '22px', cursor: 'pointer', fontSize: '0.75rem', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 0 }}>×</button>
                      <div style={{ fontSize: '0.65rem', textAlign: 'center', color: '#999', marginTop: '2px' }}>Photo {i+1}</div>
                    </div>
                  ))}
                </div>
              )}

              {/* Boutons ajout photo */}
              {ticketPhotos.length < 4 && (
                <div style={{ display: 'flex', gap: '0.5rem', marginBottom: ticketPhotos.length > 0 ? '1rem' : '0', justifyContent: ticketPhotos.length === 0 ? 'center' : 'flex-start', flexDirection: ticketPhotos.length === 0 ? 'column' : 'row' }}>
                  {ticketPhotos.length === 0 && <div style={{ textAlign: 'center', fontSize: '3rem', marginBottom: '0.75rem' }}>🧾</div>}
                  {ticketPhotos.length === 0 && <p style={{ color: '#999', fontSize: '0.9rem', textAlign: 'center', marginBottom: '1rem' }}>Prends jusqu'à 4 photos pour couvrir tout le ticket</p>}
                  <label style={{ flex: ticketPhotos.length > 0 ? 1 : undefined, display: 'block', padding: '0.85rem', background: 'linear-gradient(135deg, #7db89a 0%, #6aab8a 100%)', color: 'white', borderRadius: '10px', cursor: 'pointer', fontSize: '0.9rem', fontWeight: 600, textAlign: 'center', marginBottom: ticketPhotos.length === 0 ? '0.75rem' : '0' }}>
                    📷 {ticketPhotos.length === 0 ? 'Prendre une photo' : '+ Photo'}
                    <input type="file" accept="image/*" capture="environment" style={{ display: 'none' }} onChange={e => {
                      const file = e.target.files[0];
                      if (!file) return;
                      const reader = new FileReader();
                      reader.onload = ev => setTicketPhotos(prev => [...prev, { preview: ev.target.result, base64: ev.target.result.split(',')[1] }]);
                      reader.readAsDataURL(file);
                      e.target.value = '';
                    }} />
                  </label>
                  <label style={{ flex: ticketPhotos.length > 0 ? 1 : undefined, display: 'block', padding: '0.85rem', background: '#f5f5f7', border: `1px solid ${cardBorder}`, color: textColor, borderRadius: '10px', cursor: 'pointer', fontSize: '0.9rem', fontWeight: 600, textAlign: 'center' }}>
                    🖼️ {ticketPhotos.length === 0 ? 'Depuis la galerie' : '+ Galerie'}
                    <input type="file" accept="image/*" style={{ display: 'none' }} onChange={e => {
                      const file = e.target.files[0];
                      if (!file) return;
                      const reader = new FileReader();
                      reader.onload = ev => setTicketPhotos(prev => [...prev, { preview: ev.target.result, base64: ev.target.result.split(',')[1] }]);
                      reader.readAsDataURL(file);
                      e.target.value = '';
                    }} />
                  </label>
                </div>
              )}
              {ticketPhotos.length === 4 && <p style={{ fontSize: '0.8rem', color: '#f0c87a', textAlign: 'center', marginBottom: '1rem' }}>Maximum 4 photos atteint</p>}

              {/* Bouton analyser */}
              {ticketPhotos.length > 0 && (
                <button onClick={analyzeTicket} disabled={!apiKey || isAnalyzing} style={{ width: '100%', padding: '0.9rem', background: (!apiKey || isAnalyzing) ? '#ccc' : 'linear-gradient(135deg, #7db89a 0%, #6aab8a 100%)', color: 'white', border: 'none', borderRadius: '10px', cursor: (!apiKey || isAnalyzing) ? 'not-allowed' : 'pointer', fontSize: '0.95rem', fontWeight: 600 }}>
                  {isAnalyzing ? '⏳ Analyse en cours...' : `🔍 Analyser ${ticketPhotos.length} photo${ticketPhotos.length > 1 ? 's' : ''}`}
                </button>
              )}
            </div>
          )}

          {scanStep === 'review' && (
            <div>
              <div style={{ background: cardBg, borderRadius: '12px', padding: '1.25rem', border: `1px solid ${cardBorder}`, marginBottom: '1rem' }}>
                <p style={{ margin: '0 0 0.25rem 0', fontWeight: 600, color: '#6a9a7e' }}>✅ {extractedProducts.filter(p => p.confidence === 'high').length} produits reconnus</p>
                {extractedProducts.some(p => p.confidence === 'low') && <p style={{ margin: 0, color: '#f0c87a', fontSize: '0.85rem' }}>⚠️ {extractedProducts.filter(p => p.confidence === 'low').length} produit(s) à valider</p>}
              </div>
              <div style={{ display: 'grid', gap: '0.75rem', marginBottom: '1.5rem' }}>
                {extractedProducts.map((p, i) => (
                  <div key={i} style={{ background: cardBg, borderRadius: '10px', padding: '1rem', border: `1px solid ${p.confidence === 'low' ? '#f0c87a' : cardBorder}`, borderLeft: `4px solid ${p.confidence === 'low' ? '#f0c87a' : '#7db89a'}` }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '0.5rem' }}>
                      <div style={{ flex: 1 }}>
                        {p.confidence === 'low' ? (
                          <div>
                            <div style={{ fontSize: '0.7rem', color: '#f0c87a', marginBottom: '0.3rem' }}>⚠️ Intitulé ambigu : "{p.raw_name}"</div>
                            <input
                              type="text"
                              value={p.editedName}
                              onChange={e => {
                                const updated = [...extractedProducts];
                                updated[i] = { ...updated[i], editedName: e.target.value };
                                setExtractedProducts(updated);
                              }}
                              style={{ width: '100%', padding: '0.5rem', border: `1px solid ${cardBorder}`, borderRadius: '6px', fontSize: '0.9rem', background: inputBg, color: textColor, boxSizing: 'border-box', marginBottom: '0.3rem' }}
                            />
                            {p.suggestions && p.suggestions.length > 0 && (
                              <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.3rem' }}>
                                {p.suggestions.map((s, si) => (
                                  <button key={si} onClick={() => {
                                    const updated = [...extractedProducts];
                                    updated[i] = { ...updated[i], editedName: s };
                                    setExtractedProducts(updated);
                                  }} style={{ padding: '0.2rem 0.6rem', background: '#f5f5f7', border: `1px solid ${cardBorder}`, borderRadius: '20px', cursor: 'pointer', fontSize: '0.75rem', color: textColor }}>
                                    {s}
                                  </button>
                                ))}
                              </div>
                            )}
                          </div>
                        ) : (
                          <div style={{ fontWeight: 500, fontSize: '0.95rem' }}>{p.editedName}</div>
                        )}
                        <div style={{ fontSize: '0.8rem', color: '#999', marginTop: '0.2rem' }}>brut : {p.raw_name}</div>
                      </div>
                      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: '0.3rem', minWidth: '70px' }}>
                        <div style={{ fontWeight: 700, fontSize: '1rem', color: '#6a9a7e' }}>{p.price ? p.price.toFixed(2) + ' €' : '?'}</div>
                        <button onClick={() => {
                          const updated = [...extractedProducts];
                          updated[i] = { ...updated[i], include: !updated[i].include };
                          setExtractedProducts(updated);
                        }} style={{ padding: '0.2rem 0.5rem', background: p.include ? '#7db89a' : '#e5e5ea', color: p.include ? 'white' : '#999', border: 'none', borderRadius: '6px', cursor: 'pointer', fontSize: '0.7rem', fontWeight: 600 }}>
                          {p.include ? '✓ inclus' : 'exclu'}
                        </button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <button onClick={savePrices} style={{ width: '100%', padding: '1rem', background: 'linear-gradient(135deg, #7db89a 0%, #6aab8a 100%)', color: 'white', border: 'none', borderRadius: '10px', cursor: 'pointer', fontSize: '1rem', fontWeight: 600 }}>
                💾 Enregistrer les prix ({extractedProducts.filter(p => p.include).length} produits)
              </button>
            </div>
          )}

          {scanStep === 'done' && (
            <div style={{ background: cardBg, borderRadius: '12px', padding: '2rem', border: `1px solid ${cardBorder}`, textAlign: 'center' }}>
              <div style={{ fontSize: '3rem', marginBottom: '1rem' }}>✅</div>
              <p style={{ fontWeight: 600, fontSize: '1.1rem', color: '#6a9a7e', marginBottom: '0.5rem' }}>Prix enregistrés !</p>
              <p style={{ color: '#999', fontSize: '0.9rem', marginBottom: '1.5rem' }}>Tu peux maintenant consulter l'évolution de tes prix dans le menu.</p>
              <div style={{ display: 'flex', gap: '0.75rem' }}>
                <button onClick={() => { setScanStep('photo'); setTicketPhotos([]); setExtractedProducts([]); }} style={{ flex: 1, padding: '0.85rem', background: '#f5f5f7', border: `1px solid ${cardBorder}`, borderRadius: '10px', cursor: 'pointer', fontSize: '0.9rem', fontWeight: 600, color: textColor }}>Scanner un autre</button>
                <button onClick={() => { setShowTicketScanner(false); setShowPriceComparison(true); }} style={{ flex: 1, padding: '0.85rem', background: 'linear-gradient(135deg, #85b8d0 0%, #6aaac8 100%)', color: 'white', border: 'none', borderRadius: '10px', cursor: 'pointer', fontSize: '0.9rem', fontWeight: 600 }}>Voir l'évolution</button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // PAGE ÉVOLUTION DES PRIX
  if (showPriceComparison) {
    const evolution = getPriceEvolution();
    const hausse = evolution.filter(p => p.diff > 0);
    const baisse = evolution.filter(p => p.diff < 0);
    const stable = Object.entries(priceHistory).filter(([, entries]) => entries.length === 1);
    return (
      <div style={{ minHeight: '100vh', background: bgGradient, fontFamily: '"Outfit", sans-serif', padding: '1.5rem', color: textColor }}>
        <style>{styles}</style>
        <div style={{ maxWidth: '600px', margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
            <h1 style={{ fontSize: '1.5rem', margin: 0, color: '#85b8d0', fontWeight: 600 }}>📊 Évolution des prix</h1>
            <button onClick={() => setShowPriceComparison(false)} style={{ background: cardBg, border: `1px solid ${cardBorder}`, padding: '0.75rem', borderRadius: '10px', cursor: 'pointer', fontSize: '1.2rem', color: textColor }}>×</button>
          </div>

          {evolution.length === 0 ? (
            <div style={{ background: cardBg, borderRadius: '12px', padding: '3rem', border: `1px solid ${cardBorder}`, textAlign: 'center' }}>
              <div style={{ fontSize: '3rem', marginBottom: '1rem' }}>📸</div>
              <p style={{ color: '#999' }}>Scanner au moins 2 tickets pour voir l'évolution des prix.</p>
              <button onClick={() => { setShowPriceComparison(false); setShowTicketScanner(true); setScanStep('photo'); }} style={{ marginTop: '1rem', padding: '0.85rem 1.5rem', background: 'linear-gradient(135deg, #7db89a 0%, #6aab8a 100%)', color: 'white', border: 'none', borderRadius: '10px', cursor: 'pointer', fontWeight: 600 }}>Scanner un ticket</button>
            </div>
          ) : (
            <div>
              {/* Résumé */}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.75rem', marginBottom: '1.5rem' }}>
                <div style={{ background: '#fff0f0', borderRadius: '12px', padding: '1rem', textAlign: 'center', border: '1px solid #fdd' }}>
                  <div style={{ fontSize: '1.8rem', fontWeight: 700, color: '#e8a090' }}>{hausse.length}</div>
                  <div style={{ fontSize: '0.8rem', color: '#c08080' }}>↑ plus cher</div>
                </div>
                <div style={{ background: '#f0fff4', borderRadius: '12px', padding: '1rem', textAlign: 'center', border: '1px solid #cfd' }}>
                  <div style={{ fontSize: '1.8rem', fontWeight: 700, color: '#7db89a' }}>{baisse.length}</div>
                  <div style={{ fontSize: '0.8rem', color: '#508870' }}>↓ moins cher</div>
                </div>
              </div>

              {hausse.length > 0 && (
                <div style={{ marginBottom: '1.5rem' }}>
                  <h3 style={{ fontSize: '0.9rem', fontWeight: 600, color: '#e8a090', marginBottom: '0.75rem', textTransform: 'uppercase', letterSpacing: '0.5px' }}>↑ Hausses</h3>
                  <div style={{ display: 'grid', gap: '0.5rem' }}>
                    {hausse.map((p, i) => (
                      <div key={i} style={{ background: cardBg, borderRadius: '10px', padding: '0.85rem 1rem', border: `1px solid ${cardBorder}`, borderLeft: '4px solid #e8a090', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <div>
                          <div style={{ fontWeight: 500, fontSize: '0.95rem' }}>{p.name}</div>
                          <div style={{ fontSize: '0.75rem', color: '#999' }}>{p.prevDate} → {p.lastDate}</div>
                        </div>
                        <div style={{ textAlign: 'right' }}>
                          <div style={{ fontWeight: 700, color: '#e8a090' }}>+{p.diff.toFixed(2)} €</div>
                          <div style={{ fontSize: '0.75rem', color: '#e8a090' }}>+{p.pct}%</div>
                          <div style={{ fontSize: '0.7rem', color: '#999' }}>{p.prevPrice.toFixed(2)} → {p.lastPrice.toFixed(2)} €</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {baisse.length > 0 && (
                <div style={{ marginBottom: '1.5rem' }}>
                  <h3 style={{ fontSize: '0.9rem', fontWeight: 600, color: '#7db89a', marginBottom: '0.75rem', textTransform: 'uppercase', letterSpacing: '0.5px' }}>↓ Baisses / Économies</h3>
                  <div style={{ display: 'grid', gap: '0.5rem' }}>
                    {baisse.map((p, i) => (
                      <div key={i} style={{ background: cardBg, borderRadius: '10px', padding: '0.85rem 1rem', border: `1px solid ${cardBorder}`, borderLeft: '4px solid #7db89a', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <div>
                          <div style={{ fontWeight: 500, fontSize: '0.95rem' }}>{p.name}</div>
                          <div style={{ fontSize: '0.75rem', color: '#999' }}>{p.prevDate} → {p.lastDate}</div>
                        </div>
                        <div style={{ textAlign: 'right' }}>
                          <div style={{ fontWeight: 700, color: '#7db89a' }}>{p.diff.toFixed(2)} €</div>
                          <div style={{ fontSize: '0.75rem', color: '#7db89a' }}>{p.pct}%</div>
                          <div style={{ fontSize: '0.7rem', color: '#999' }}>{p.prevPrice.toFixed(2)} → {p.lastPrice.toFixed(2)} €</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {stable.length > 0 && (
                <div>
                  <h3 style={{ fontSize: '0.9rem', fontWeight: 600, color: '#999', marginBottom: '0.75rem', textTransform: 'uppercase', letterSpacing: '0.5px' }}>= Un seul relevé</h3>
                  <div style={{ display: 'grid', gap: '0.5rem' }}>
                    {stable.map(([name, entries], i) => (
                      <div key={i} style={{ background: cardBg, borderRadius: '10px', padding: '0.85rem 1rem', border: `1px solid ${cardBorder}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <div style={{ fontWeight: 500, fontSize: '0.9rem' }}>{name}</div>
                        <div style={{ color: '#999', fontSize: '0.85rem' }}>{entries[0].price.toFixed(2)} € — {entries[0].date}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  // MODE SHOPPING
  if (shoppingMode) {
    return (
      <div style={{ minHeight: '100vh', background: bgGradient, fontFamily: '"Outfit", "Segoe UI", sans-serif', padding: '2rem', color: textColor }}>
        <style>{styles}</style>
        <div style={{ maxWidth: '900px', margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '2rem' }}>
            <h1 style={{ fontSize: '2rem', margin: 0, color: '#6a9a7e', fontWeight: 600 }}>Courses</h1>
            <button onClick={() => setShoppingMode(false)} style={{ background: cardBg, border: `1px solid ${cardBorder}`, padding: '0.75rem', borderRadius: '10px', cursor: 'pointer', fontSize: '1.5rem', color: textColor }}>×</button>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: '1rem', marginBottom: '2rem' }}>
            <div style={{ background: 'linear-gradient(135deg, #fff5f0 0%, #ffe8e0 100%)', borderRadius: '12px', padding: '1.5rem', textAlign: 'center', border: '1px solid #f0d4c4', animation: 'fadeIn 0.3s' }}>
              <div style={{ fontSize: '2rem', fontWeight: 700, color: '#e8a090', marginBottom: '0.5rem' }}>{itemsRemaining}</div>
              <div style={{ fontSize: '0.8rem', color: '#8b5a3c' }}>à faire</div>
            </div>
            <div style={{ background: 'linear-gradient(135deg, #f0f8f5 0%, #e0f0eb 100%)', borderRadius: '12px', padding: '1.5rem', textAlign: 'center', border: '1px solid #c8e0d8', animation: 'fadeIn 0.3s' }}>
              <div style={{ fontSize: '2rem', fontWeight: 700, color: '#f0c87a', marginBottom: '0.5rem' }}>{itemsInCart}</div>
              <div style={{ fontSize: '0.8rem', color: '#9b7d3a' }}>caddie</div>
            </div>
            <div style={{ background: 'linear-gradient(135deg, #f5f0f8 0%, #f0e8f5 100%)', borderRadius: '12px', padding: '1.5rem', textAlign: 'center', border: '1px solid #e8d4f0', animation: 'fadeIn 0.3s' }}>
              <div style={{ fontSize: '2rem', fontWeight: 700, color: '#e090b8', marginBottom: '0.5rem' }}>{itemsUnavailable}</div>
              <div style={{ fontSize: '0.8rem', color: '#8b5a7d' }}>indispo</div>
            </div>
          </div>

          {itemsRemaining > 0 && (
            <div style={{ background: cardBg, borderRadius: '12px', padding: '1.5rem', marginBottom: '1.5rem', border: `1px solid ${cardBorder}`, animation: 'slideInLeft 0.3s' }}>
              <h3 style={{ margin: '0 0 1rem 0', fontSize: '1rem', fontWeight: 600, color: textColor }}>À faire</h3>
              <div style={{ display: 'grid', gap: '0.75rem' }}>
                {Object.entries(shoppingItems).filter(([_, data]) => data.status === 'pending').map(([id, data], idx) => (
                  <div key={id} style={{ background: inputBg, padding: '1rem', borderRadius: '10px', border: `1px solid ${cardBorder}`, display: 'flex', alignItems: 'center', gap: '0.75rem', flexWrap: 'wrap', animation: `slideInLeft ${0.1 + idx * 0.05}s` }}>
                    <div style={{ flex: 1, minWidth: '150px' }}>
                      <div style={{ fontSize: '0.95rem', fontWeight: 500 }}>{data.item.name}</div>
                      {data.item.note && <div style={{ fontSize: '0.75rem', color: '#999', marginTop: '0.2rem', fontStyle: 'italic' }}>{data.item.note}</div>}
                      <div style={{ fontSize: '0.8rem', color: '#999', marginTop: '0.3rem' }}>{data.item.quantity} {data.item.unit}</div>
                    </div>
                    <button onClick={() => updateItemStatus(id, 'inCart')} style={{ padding: '0.5rem 0.8rem', background: '#7db89a', color: 'white', border: 'none', borderRadius: '8px', cursor: 'pointer', fontSize: '0.75rem', fontWeight: 600, transition: 'all 0.3s' }}>Caddie</button>
                    <button onClick={() => updateItemStatus(id, 'unavailable')} style={{ padding: '0.5rem 0.8rem', background: '#e8a090', color: 'white', border: 'none', borderRadius: '8px', cursor: 'pointer', fontSize: '0.75rem', fontWeight: 600, transition: 'all 0.3s' }}>Indispo</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {itemsInCart > 0 && (
            <div style={{ background: 'linear-gradient(135deg, #f0f8f5 0%, #e0f0eb 100%)', borderRadius: '12px', padding: '1.5rem', marginBottom: '1.5rem', border: '1px solid #c8e0d8', animation: 'slideInLeft 0.3s' }}>
              <h3 style={{ margin: '0 0 1rem 0', fontSize: '1rem', fontWeight: 600, color: '#6a9a7e' }}>Dans le caddie</h3>
              <div style={{ display: 'grid', gap: '0.75rem' }}>
                {Object.entries(shoppingItems).filter(([_, data]) => data.status === 'inCart').map(([id, data]) => (
                  <div key={id} style={{ background: 'white', padding: '1rem', borderRadius: '10px', border: '1px solid #c8e0d8', display: 'flex', alignItems: 'center', gap: '1rem', opacity: 0.65, animation: 'fadeIn 0.3s' }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: '0.95rem', fontWeight: 500, textDecoration: 'line-through', color: '#999' }}>{data.item.name}</div>
                      <div style={{ fontSize: '0.8rem', color: '#bbb', marginTop: '0.3rem' }}>{data.item.quantity} {data.item.unit}</div>
                    </div>
                    <button onClick={() => updateItemStatus(id, 'pending')} style={{ padding: '0.5rem 1rem', background: 'white', color: '#7db89a', border: '1px solid #c8e0d8', borderRadius: '8px', cursor: 'pointer', fontSize: '0.8rem', fontWeight: 600, transition: 'all 0.3s' }}>Annuler</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {itemsUnavailable > 0 && (
            <div style={{ background: 'linear-gradient(135deg, #fff5f0 0%, #ffe8e0 100%)', borderRadius: '12px', padding: '1.5rem', marginBottom: '1.5rem', border: '1px solid #f0d4c4', animation: 'slideInLeft 0.3s' }}>
              <h3 style={{ margin: '0 0 1rem 0', fontSize: '1rem', fontWeight: 600, color: '#e8a090' }}>Indisponibles</h3>
              <div style={{ display: 'grid', gap: '0.75rem' }}>
                {Object.entries(shoppingItems).filter(([_, data]) => data.status === 'unavailable').map(([id, data]) => (
                  <div key={id} style={{ background: 'white', padding: '1rem', borderRadius: '10px', border: '1px solid #f0d4c4', display: 'flex', alignItems: 'center', gap: '1rem', opacity: 0.65, animation: 'fadeIn 0.3s' }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: '0.95rem', fontWeight: 500, color: '#999' }}>{data.item.name}</div>
                      <div style={{ fontSize: '0.8rem', color: '#bbb', marginTop: '0.3rem' }}>{data.item.quantity} {data.item.unit}</div>
                    </div>
                    <button onClick={() => updateItemStatus(id, 'pending')} style={{ padding: '0.5rem 1rem', background: 'white', color: '#e8a090', border: '1px solid #f0d4c4', borderRadius: '8px', cursor: 'pointer', fontSize: '0.8rem', fontWeight: 600, transition: 'all 0.3s' }}>Annuler</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={{ background: cardBg, borderRadius: '12px', padding: '1.5rem', marginBottom: '1.5rem', border: `1px solid ${cardBorder}` }}>
            <h3 style={{ margin: '0 0 1rem 0', fontSize: '1rem', fontWeight: 600, color: textColor }}>💰 Montant dépensé</h3>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
              <input type="number" placeholder="Montant total (€)" value={shoppingAmount} onChange={(e) => setShoppingAmount(e.target.value)} step="0.01" min="0" style={{ padding: '0.85rem', border: `1px solid ${cardBorder}`, borderRadius: '8px', fontSize: '1rem', background: inputBg, color: textColor, transition: 'all 0.3s' }} />
              <p style={{ margin: '0', fontSize: '0.85rem', color: '#999', fontStyle: 'italic' }}>Saisis le montant total que tu as dépensé</p>
            </div>
          </div>

          <div style={{ display: 'flex', gap: '0.75rem' }}>
            <button onClick={finalizeShopping} style={{ flex: 1, padding: '1rem', background: 'linear-gradient(135deg, #7db89a 0%, #6aab8a 100%)', color: 'white', border: 'none', borderRadius: '10px', cursor: 'pointer', fontSize: '1rem', fontWeight: 600, transition: 'all 0.3s' }}>Valider les achats</button>
            <button onClick={() => { setShoppingMode(false); setShowTicketScanner(true); setScanStep('photo'); setTicketPhotos([]); setExtractedProducts([]); }} style={{ padding: '1rem 1.2rem', background: cardBg, border: `2px solid #7db89a`, borderRadius: '10px', cursor: 'pointer', fontSize: '1.3rem', transition: 'all 0.3s' }} title="Scanner le ticket">📸</button>
          </div>
        </div>
      </div>
    );
  }

  // PAGE PRINCIPALE
  return (
    <div style={{ minHeight: '100vh', background: bgGradient, fontFamily: '"Outfit", "Segoe UI", sans-serif', padding: '2rem', color: textColor }}>
      <style>{styles}</style>

      {menuOpen && <div onClick={() => setMenuOpen(false)} style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0, 0, 0, ' + (darkMode ? '0.5' : '0.3') + ')', zIndex: 998 }} />}

      <div style={{ position: 'fixed', top: 0, left: 0, height: '100vh', width: '280px', background: cardBg, boxShadow: '2px 0 12px rgba(0, 0, 0, 0.15)', transform: menuOpen ? 'translateX(0)' : 'translateX(-100%)', transition: 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)', zIndex: 999, borderRight: `1px solid ${cardBorder}`, overflowY: 'auto' }}>
        <div style={{ paddingLeft: '1.5rem', paddingRight: '1.5rem', paddingTop: '2rem' }}>
          <button onClick={() => setMenuOpen(false)} style={{ background: 'none', border: 'none', fontSize: '1.5rem', cursor: 'pointer', color: '#6a9a7e', marginBottom: '2rem' }}>×</button>
          
          <nav style={{ display: 'grid', gap: '0.75rem' }}>
            <button onClick={() => { setShowHistory(true); setMenuOpen(false); }} style={{ width: '100%', padding: '1rem', background: '#f5f5f7', color: '#85b8d0', border: `2px solid #85b8d0`, borderRadius: '10px', cursor: 'pointer', fontSize: '0.95rem', fontWeight: 600, textAlign: 'left', transition: 'all 0.3s' }}>📋 Historique</button>
            <button onClick={() => { setShowStats(true); setMenuOpen(false); }} style={{ width: '100%', padding: '1rem', background: '#f5f5f7', color: '#f0c87a', border: `2px solid #f0c87a`, borderRadius: '10px', cursor: 'pointer', fontSize: '0.95rem', fontWeight: 600, textAlign: 'left', transition: 'all 0.3s' }}>📊 Statistiques</button>

            <button onClick={() => { setShowLoyaltyCards(true); setMenuOpen(false); }} style={{ width: '100%', padding: '1rem', background: '#f5f5f7', color: '#f0c87a', border: `2px solid #f0c87a`, borderRadius: '10px', cursor: 'pointer', fontSize: '0.95rem', fontWeight: 600, textAlign: 'left', transition: 'all 0.3s' }}>💳 Cartes de fidélité</button>
            <button onClick={() => { setShowExpenses(true); setMenuOpen(false); }} style={{ width: '100%', padding: '1rem', background: '#f5f5f7', color: '#85b8d0', border: `2px solid #85b8d0`, borderRadius: '10px', cursor: 'pointer', fontSize: '0.95rem', fontWeight: 600, textAlign: 'left', transition: 'all 0.3s' }}>💰 Dépenses</button>
            <button onClick={() => { setShowCategories(true); setMenuOpen(false); }} style={{ width: '100%', padding: '1rem', background: '#f5f5f7', color: '#e090b8', border: `2px solid #e090b8`, borderRadius: '10px', cursor: 'pointer', fontSize: '0.95rem', fontWeight: 600, textAlign: 'left', transition: 'all 0.3s' }}>⚙️ Paramètres</button>

            <button onClick={() => { setShowTicketScanner(true); setMenuOpen(false); setScanStep('photo'); setTicketPhotos([]); setExtractedProducts([]); }} style={{ width: '100%', padding: '1rem', background: '#f5f5f7', color: '#7db89a', border: `2px solid #7db89a`, borderRadius: '10px', cursor: 'pointer', fontSize: '0.95rem', fontWeight: 600, textAlign: 'left', transition: 'all 0.3s' }}>📸 Scanner un ticket</button>
            <button onClick={() => { setShowPriceComparison(true); setMenuOpen(false); }} style={{ width: '100%', padding: '1rem', background: '#f5f5f7', color: '#85b8d0', border: `2px solid #85b8d0`, borderRadius: '10px', cursor: 'pointer', fontSize: '0.95rem', fontWeight: 600, textAlign: 'left', transition: 'all 0.3s' }}>📊 Évolution des prix</button>

            <div style={{ display: 'flex', gap: '0.5rem', marginTop: '1rem' }}>
              <button onClick={undo} disabled={historyIndex <= 0} style={{ flex: 1, padding: '0.8rem', background: historyIndex <= 0 ? '#e8ddd2' : '#b8d4bc', color: 'white', border: 'none', cursor: historyIndex <= 0 ? 'not-allowed' : 'pointer', fontSize: '0.8rem', fontWeight: 600, borderRadius: '8px', transition: 'all 0.3s' }}>↶ Annuler</button>
              <button onClick={redo} disabled={historyIndex >= history_actions.length - 1} style={{ flex: 1, padding: '0.8rem', background: historyIndex >= history_actions.length - 1 ? '#e8ddd2' : '#b8d4bc', color: 'white', border: 'none', cursor: historyIndex >= history_actions.length - 1 ? 'not-allowed' : 'pointer', fontSize: '0.8rem', fontWeight: 600, borderRadius: '8px', transition: 'all 0.3s' }}>↷ Refaire</button>
            </div>
          </nav>
        </div>
      </div>

      {/* Bannière avec motifs discrets */}
      <div style={{ background: 'linear-gradient(135deg, #fafafa 0%, #f5f5f7 100%)', padding: '0.8rem 2rem', marginBottom: '2rem', borderRadius: '0', width: '100vw', marginLeft: 'calc(-50vw + 50%)', position: 'relative', overflow: 'hidden', boxShadow: '0 2px 8px rgba(0, 0, 0, 0.05)' }}>
        {/* Motifs en arrière-plan */}
        <div style={{ position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, opacity: 0.08, pointerEvents: 'none' }}>
          <svg width="100%" height="100%" style={{ position: 'absolute' }}>
            <defs>
              <pattern id="shopping-pattern" x="0" y="0" width="200" height="150" patternUnits="userSpaceOnUse">
                {/* Caddie */}

                              <div style={{ fontSize: '0.8rem', color: '#999', marginTop: '0.25rem' }}>{template.unit}</div>
                            </div>
                            <button onClick={() => toggleTemplateFavorite(template.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '1.2rem', transition: 'all 0.3s', padding: 0, minWidth: 'auto' }}>☆</button>
                          </div>
                          <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}>
                            <input type="number" placeholder="Qté" value={quickAddQuantities[template.id] || ''} onChange={(e) => setQuickAddQuantities(prev => ({ ...prev, [template.id]: e.target.value }))} min="0.1" step="0.1" style={{ width: '50px', padding: '0.5rem', border: `1px solid ${cardBorder}`, borderRadius: '6px', fontSize: '0.85rem', background: inputBg, color: textColor, transition: 'all 0.3s' }} />
                            <button onClick={() => quickAddFromTemplate(template)} style={{ padding: '0.5rem 0.8rem', background: justAdded === template.id ? '#b8d4bc' : (isTemplateInInventory(template.name) ? '#d9ced7' : '#7db89a'), color: 'white', border: 'none', borderRadius: '6px', cursor: isTemplateInInventory(template.name) && justAdded !== template.id ? 'not-allowed' : 'pointer', fontSize: '0.8rem', fontWeight: 600, opacity: isTemplateInInventory(template.name) && justAdded !== template.id ? 0.6 : 1, transition: 'all 0.3s ease', transform: justAdded === template.id ? 'scale(1.15)' : 'scale(1)' }}>
                              {justAdded === template.id ? '✓' : '+'}
                            </button>
                            <button onClick={() => { setShowProductStats(true); setSelectedProductStats(template.name); }} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '1rem', color: '#85b8d0', transition: 'all 0.3s', padding: '0.5rem', minWidth: 'auto' }}>📊</button>
                            <button onClick={() => deleteTemplate(template.id)} style={{ background: '#f5f0e8', border: `1px solid ${cardBorder}`, padding: '0.5rem', borderRadius: '6px', cursor: 'pointer', fontSize: '1rem', color: '#e8a090', transition: 'all 0.3s', marginLeft: 'auto' }}>×</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ))
            )}

            {favoriteTemplates.length === 0 && Object.entries(groupedTemplates).length === 0 && (
              <div style={{ textAlign: 'center', padding: '3rem 1rem', color: '#999', animation: 'fadeIn 0.3s' }}>
                <p style={{ fontSize: '1rem', margin: 0 }}>Ajoute tes produits habituels</p>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Kadee />);
    </script>
</body>
</html>
